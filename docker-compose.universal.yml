version: '3.8'

services:
  # MongoDB 数据库
  mongodb:
    image: mongo:latest
    container_name: fuyuan-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:-fuyuan123456}
      MONGO_INITDB_DATABASE: fuyuan
    volumes:
      - mongodb_data:/data/db
      - mongodb_config:/data/configdb
    networks:
      - fuyuan_network

  # MySQL 数据库
  mysql:
    image: mysql:8.0
    container_name: fuyuan-mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_PASSWORD:-fuyuan123456}
      MYSQL_DATABASE: fuyuan
    volumes:
      - mysql_data:/var/lib/mysql
    networks:
      - fuyuan_network

  # PostgreSQL 数据库
  postgresql:
    image: postgres:15
    container_name: fuyuan-postgresql
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuyuan123456}
      POSTGRES_DB: fuyuan
    volumes:
      - postgresql_data:/var/lib/postgresql/data
    networks:
      - fuyuan_network

  # Redis 缓存
  redis:
    image: redis:latest
    container_name: fuyuan-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-fuyuan123456}
    volumes:
      - redis_data:/data
    networks:
      - fuyuan_network

  # RabbitMQ 消息队列
  rabbitmq:
    image: rabbitmq:3-management
    container_name: fuyuan-rabbitmq
    restart: unless-stopped
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER:-admin}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD:-fuyuan123456}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - fuyuan_network

  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: fuyuan-backend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_TYPE: ${DB_TYPE:-mongodb}
      DB_HOST: mongodb
      DB_PORT: 27017
      DB_NAME: fuyuan
      DB_USER: admin
      DB_PASSWORD: ${MONGO_PASSWORD:-fuyuan123456}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-fuyuan123456}
      RABBITMQ_URL: amqp://admin:${RABBITMQ_PASSWORD:-fuyuan123456}@rabbitmq:5672
    volumes:
      - ./backend/uploads:/app/uploads
      - backend_logs:/app/logs
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - fuyuan_network

  # 前端服务
  frontend:
    build:
      context: ./frontend-react
      dockerfile: Dockerfile
    container_name: fuyuan-frontend
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - fuyuan_network

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: fuyuan-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
      - "8443:443"
    volumes:
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./frontend-react/dist:/usr/share/nginx/html:ro
      - ./docker/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    depends_on:
      - backend
      - frontend
    networks:
      - fuyuan_network

volumes:
  mongodb_data:
  mongodb_config:
  mysql_data:
  postgresql_data:
  redis_data:
  rabbitmq_data:
  backend_logs:
  nginx_logs:

networks:
  fuyuan_network:
    driver: bridge
