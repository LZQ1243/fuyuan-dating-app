version: '3.8'

services:
  # MongoDB数据库 - 生产配置
  mongodb:
    image: mongo:6.0
    container_name: fuyuan-mongodb-prod
    restart: always
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: fuyuan
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD}
    volumes:
      - mongodb_data_prod:/data/db
      - mongodb_config_prod:/data/configdb
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js
    networks:
      - fuyuan-network-prod
    command: --wiredTigerCacheSizeGB 2 --auth

  # Redis缓存 - 生产配置
  redis:
    image: redis:7-alpine
    container_name: fuyuan-redis-prod
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data_prod:/data
    networks:
      - fuyuan-network-prod
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 2gb --maxmemory-policy allkeys-lru

  # RabbitMQ消息队列 - 生产配置
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: fuyuan-rabbitmq-prod
    restart: always
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_USER}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_PASSWORD}
      RABBITMQ_DEFAULT_VHOST: fuyuan
    volumes:
      - rabbitmq_data_prod:/var/lib/rabbitmq
    networks:
      - fuyuan-network-prod

  # 后端服务 - 生产配置
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
      target: production
    image: fuyuan-backend:latest
    container_name: fuyuan-backend-prod
    restart: always
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      MONGODB_URI: mongodb://${MONGO_ROOT_USERNAME}:${MONGO_ROOT_PASSWORD}@mongodb:27017/fuyuan?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD}
      RABBITMQ_URL: amqp://${RABBITMQ_USER}:${RABBITMQ_PASSWORD}@rabbitmq:5672/fuyuan
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      UPLOAD_MAX_SIZE: 10mb
      RATE_LIMIT_WINDOW: 15
      RATE_LIMIT_MAX: 100
    volumes:
      - ../backend/uploads:/app/uploads
      - ../backend/logs:/app/logs
      - ../backend/config:/app/config:ro
    depends_on:
      - mongodb
      - redis
      - rabbitmq
    networks:
      - fuyuan-network-prod
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # 前端服务 - 生产配置
  frontend:
    build:
      context: ../frontend-react
      dockerfile: Dockerfile
    image: fuyuan-frontend:latest
    container_name: fuyuan-frontend-prod
    restart: always
    ports:
      - "80:80"
    volumes:
      - ../frontend-react/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
    networks:
      - fuyuan-network-prod

volumes:
  mongodb_data_prod:
  mongodb_config_prod:
  redis_data_prod:
  rabbitmq_data_prod:

networks:
  fuyuan-network-prod:
    driver: bridge
